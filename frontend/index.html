<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>School Trip System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css"/>
</head>

<body class="bg-light">

<div class="container my-4">

  <h1 class="text-center mb-4">School Trip Management System</h1>

  <div class="row g-3">

    <div class="col-md-6">
      <div class="card shadow-sm p-3">
        <h5>Register User</h5>

        <form id="register-form">
          <select id="register-type" class="form-select mb-2">
            <option value="teacher">Teacher</option>
            <option value="student">Student</option>
          </select>

          <input id="register-first-name" class="form-control mb-2" placeholder="First Name"/>
          <input id="register-last-name" class="form-control mb-2" placeholder="Last Name"/>
          <input id="register-id" class="form-control mb-2" placeholder="ID"/>
          <input id="register-class" class="form-control mb-2" placeholder="Class"/>

          <button class="btn btn-primary w-100">Register</button>
        </form>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card shadow-sm p-3">
        <h5>Update Location</h5>

        <select id="location-type" class="form-select mb-2">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
        </select>

        <input id="location-id" class="form-control mb-2" placeholder="ID"/>

        <label>Longitude</label>
        <div class="row g-1 mb-2">
          <div class="col"><input id="long-deg" class="form-control" placeholder="Deg"/></div>
          <div class="col"><input id="long-min" class="form-control" placeholder="Min"/></div>
          <div class="col"><input id="long-sec" class="form-control" placeholder="Sec"/></div>
        </div>

        <label>Latitude</label>
        <div class="row g-1 mb-2">
          <div class="col"><input id="lat-deg" class="form-control" placeholder="Deg"/></div>
          <div class="col"><input id="lat-min" class="form-control" placeholder="Min"/></div>
          <div class="col"><input id="lat-sec" class="form-control" placeholder="Sec"/></div>
        </div>

        <button id="update-location" class="btn btn-success w-100">Update Location</button>
      </div>
    </div>

  </div>

  <div class="row g-3 mt-2">

    <div class="col-md-6">

      <div class="card shadow-sm p-3" id="teacher-access-card">
        <h5>Teacher Access</h5>

        <input id="access-teacher-id" class="form-control mb-2" placeholder="Teacher ID"/>
        <input id="access-teacher-first-name" class="form-control mb-2" placeholder="First Name"/>
        <input id="access-teacher-last-name" class="form-control mb-2" placeholder="Last Name"/>

        <button id="verify-teacher" class="btn btn-primary w-100">Verify</button>
      </div>

      <div class="card shadow-sm p-3 d-none" id="teacher-actions">
        <h5>Teacher Actions</h5>

        <button id="logout-teacher" class="btn btn-secondary mb-2 w-100">Switch Teacher</button>
        <button id="load-teachers" class="btn btn-outline-primary mb-2 w-100">All Teachers</button>
        <button id="load-students" class="btn btn-outline-primary mb-2 w-100">All Students</button>

        <input id="find-teacher-id" class="form-control mb-2" placeholder="Teacher ID"/>
        <button id="find-teacher" class="btn btn-outline-secondary mb-2 w-100">Find Teacher</button>

        <input id="find-student-id" class="form-control mb-2" placeholder="Student ID"/>
        <button id="find-student" class="btn btn-outline-secondary mb-2 w-100">Find Student</button>

        <button id="load-my-students" class="btn btn-outline-success mb-2 w-100">My Students</button>
        <button id="check-far-students" class="btn btn-danger w-100">Far Students</button>
      </div>

    </div>

    <div class="col-md-6">
      <div class="card shadow-sm p-3">
        <h5>Results</h5>
        <div id="results"></div>
      </div>
    </div>

  </div>

  <div class="card shadow-sm p-3 mt-3">
    <h5>Map</h5>
    <div id="map"></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
